<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="game1.css">
</head>

<body>
    <nav class="nav-bar">
        <h1>GAME ARENA</h1>
        <div class="nav-links">
            <p class="nav-link"><a>Home</a></p>
            <p class="nav-link"><a>Heros</a></p>
            <p class="nav-link"><a>More</a></p>
        </div>
    </nav>
    <h1 style="justify-content:center; display:flex; color:white;">Game Arena</h1>

    <div class="hero-selection">
        <h2>Select Your Hero : </h2>

        <div class="hero-slider">

            <button class="arrow left" onclick="PrevHero()">❮</button>

            <div class="slider-window">

                <div class="hero-track">

                    <div class="hero-card">
                        <img src="https://i.pinimg.com/1200x/f9/8b/a5/f98ba5fb08af2f270a98f37daeaafabb.jpg"
                            onclick="SelectHero('THOR')">
                        <p>THOR</p>
                    </div>

                    <div class="hero-card">
                        <img src="https://i.pinimg.com/736x/09/06/a8/0906a83b59374a33b4c7da17c35feb93.jpg"
                            onclick="SelectHero('WOLVERINE')">
                        <p>WOLVERINE</p>
                    </div>

                    <div class="hero-card">
                        <img src="https://cdn.marvel.com/content/2x/venom_2021_1_announcement_coming_this_november.jpg"
                            onclick="SelectHero('VENOM')">
                        <p>VENOM</p>
                    </div>

                </div>

            </div>

            <button class="arrow right" onclick="NextHero()">❯</button>

        </div>
    </div>

    <p class="hero1">PLAYER 1 HERO : NOT SELECTED </p>
    <p class="hero2">PLAYER 2 HERO : NOT SELECTED </p>



    <button class="Startbtl" onclick="StartBattle()"> Start Battle ! </button>
    <div class="overlay">
        <div class="BattleArea">


            <p class="P1health"></p>
            <p class="P2health"></p>

            <p class="TurnText"></p>

            <button class="atk1" onclick="Attack(1)">PUNCH</button>
            <button class="atk2" onclick="Attack(2)">POWER PUNCH (2)</button>
            <button class="atk3" onclick="Attack(3)"></button>

            <p class="ActionText"></p>
            <p class="Status"></p>
            <p class="Result"></p>
            <button ondblclick="ExitBattle()">End Battle</button>
        </div>
    </div>
</body>

<script src="main.js"></script>
<script src="attacklogic.js"></script>

</html>
