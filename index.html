<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="game1.css">
</head>

<body>
    <nav class="nav-bar">
        <h1>GAME ARENA</h1>
        <div class="nav-links">
            <p class="nav-link"><a>Home</a></p>
            <p class="nav-link"><a>Heros</a></p>
            <p class="nav-link"><a>More</a></p>
        </div>
    </nav>
    <h1 style="justify-content:center; display:flex;">Game Arena</h1>

    <div class="hero-selection">
        <h2>Select Your Hero : </h2>

        <div class="heros">

            <div class="hero-card">
                <img src="https://upload.wikimedia.org/wikipedia/en/thumb/2/21/Web_of_Spider-Man_Vol_1_129-1.png/250px-Web_of_Spider-Man_Vol_1_129-1.png"
                    alt="" onclick="SelectHero('Spider-Man')">
                <p>Spider-man</p>
            </div>
            <div class="hero-card">
                <img src="https://upload.wikimedia.org/wikipedia/en/thumb/4/47/Iron_Man_%28circa_2018%29.png/250px-Iron_Man_%28circa_2018%29.png"
                    alt="" onclick="SelectHero('Iron-Man')">
                <p>Iron-Man</p>
            </div>
            <div class="hero-card">
                <img src="https://michaelspradlin.com/WP/wp-content/uploads/2013/06/Captain-America-Comic-e1370355949874.jpg"
                    alt="" onclick="SelectHero('Captain-America')">
                <p>Captain-America</p>
            </div>

        </div>
    </div>
    
    <p class="hero1">PLAYER 1 HERO : NOT SELECTED </p>
    <p class="hero2">PLAYER 2 HERO : NOT SELECTED </p>

    <button> Start Battle ! </button>

    <div class="BattleArea">
        <p class="TurnText"></p>
        
        <p class="P1health"></p>
        <p class="P2health"></p>

        <button>Attack 1</button>
        <button>Attack 1</button>
        <button>Attack 1</button>

        <p class="ActionText"></p>

        <p class="Result"></p>
    </div>
</body>

<script src="game1.js"></script>

</html>
